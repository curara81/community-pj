<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="slab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="vein" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3a3a3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#737373" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Marble slab (centered, tilted) -->
  <g transform="translate(256 256) rotate(-8)" filter="url(#shadow)">
    <!-- Slab body -->
    <rect x="-150" y="-180" width="300" height="360" rx="18" ry="18" fill="url(#slab)"/>

    <!-- Marble veining -->
    <path d="M -130 -140 Q -50 -100 0 -50 T 130 30" stroke="url(#vein)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M -120 60 Q -70 90 -10 80 T 120 110" stroke="url(#vein)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M 80 -160 Q 100 -100 60 -40 T 100 60" stroke="url(#vein)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M -100 140 Q -30 160 50 145" stroke="url(#vein)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- Subtle speckles -->
    <circle cx="-60" cy="-60" r="2.5" fill="#9ca3af" opacity="0.5"/>
    <circle cx="40" cy="-110" r="2" fill="#9ca3af" opacity="0.4"/>
    <circle cx="90" cy="100" r="2" fill="#9ca3af" opacity="0.5"/>
    <circle cx="-90" cy="20" r="1.5" fill="#9ca3af" opacity="0.4"/>

    <!-- Polished highlight -->
    <ellipse cx="-50" cy="-140" rx="80" ry="20" fill="#ffffff" opacity="0.35"/>
  </g>

  <!-- Magnifier (top-right corner, suggesting identification) -->
  <g transform="translate(360 152)">
    <circle cx="0" cy="0" r="44" fill="none" stroke="#fbbf24" stroke-width="10"/>
    <circle cx="0" cy="0" r="44" fill="#fbbf24" fill-opacity="0.12"/>
    <line x1="32" y1="32" x2="62" y2="62" stroke="#fbbf24" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
